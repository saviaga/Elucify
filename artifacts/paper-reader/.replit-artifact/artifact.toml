kind = "web"
  previewPath = "/"
  title = "Paper Reader"
  version = "1.0.0"
  id = "artifacts/paper-reader"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  localPort = 25230
  name = "web"
  paths = ["/"]

  [services.development]
  run = "pnpm --filter @workspace/paper-reader run dev"

  [services.env]
  PORT = "25230"
  BASE_PATH = "/"

  [services.production]
  build = "pnpm --filter @workspace/paper-reader run build && pnpm --filter @workspace/api-server run build"
  run = "BASE_PATH=/ node artifacts/api-server/dist/index.cjs"
  